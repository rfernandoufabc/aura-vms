{% extends "base.html" %}
{% block content %}

<style>
    .reset-wrapper {
        max-width: 420px;
        margin: 60px auto 0;
    }

    .reset-header {
        text-align: center;
        margin-bottom: 28px;
    }

    .reset-header .icon {
        font-size: 2.5em;
        margin-bottom: 10px;
    }

    .reset-header h2 {
        font-size: 1.3em;
        font-weight: 700;
        margin-bottom: 6px;
    }

    .reset-header p {
        color: var(--text-muted);
        font-size: .84em;
        line-height: 1.6;
    }

    .strength-bar-wrap {
        height: 4px;
        background: rgba(255,255,255,.08);
        border-radius: 2px;
        margin: -10px 0 16px;
        overflow: hidden;
    }

    .strength-bar {
        height: 100%;
        width: 0%;
        border-radius: 2px;
        transition: width .3s, background .3s;
    }

    .strength-hint {
        font-size: .72em;
        margin: -12px 0 16px;
        min-height: 14px;
        transition: color .3s;
    }
</style>

<div class="reset-wrapper">
    <div class="reset-header">
        <div class="icon">🔑</div>
        <h2>Nova senha</h2>
        <p>Escolha uma senha forte para proteger sua conta.</p>
    </div>

    <div class="card">
        <form method="POST" id="reset-form">
            <input type="hidden" name="token" value="{{ token }}">

            <label style="color:var(--text-muted);font-size:.75em;text-transform:uppercase;letter-spacing:1px;">
                Nova senha
            </label>
            <input type="password" name="password" id="pwd"
                   placeholder="Mínimo 8 caracteres"
                   required oninput="checkStrength(this.value)">

            <div class="strength-bar-wrap">
                <div class="strength-bar" id="strength-bar"></div>
            </div>
            <div class="strength-hint" id="strength-hint"></div>

            <label style="color:var(--text-muted);font-size:.75em;text-transform:uppercase;letter-spacing:1px;">
                Confirmar nova senha
            </label>
            <input type="password" name="password_confirm" id="pwd2"
                   placeholder="Repita a senha"
                   required>

            <button type="submit" style="width:100%;margin-top:6px;">
                ✅ Definir nova senha
            </button>
        </form>
    </div>

    <a href="/login"
       style="display:block;text-align:center;margin-top:16px;
              font-size:.82em;color:var(--text-muted);text-decoration:none;">
        ← Voltar para o login
    </a>
</div>

<script>
    function checkStrength(val) {
        const bar  = document.getElementById('strength-bar');
        const hint = document.getElementById('strength-hint');
        let score = 0;
        if (val.length >= 8)              score++;
        if (/[A-Z]/.test(val))            score++;
        if (/[0-9]/.test(val))            score++;
        if (/[^A-Za-z0-9]/.test(val))     score++;

        const widths = ['0%','25%','50%','75%','100%'];
        const colors = ['#FF0055','#FF6B35','#FFD700','#00B39F','#00F5D4'];
        const labels = ['','Fraca','Regular','Boa','Forte'];

        bar.style.width      = widths[score];
        bar.style.background = score ? colors[score - 1] : 'transparent';
        hint.textContent     = labels[score];
        hint.style.color     = val.length ? colors[score - 1] : 'transparent';
    }

    document.getElementById('reset-form').addEventListener('submit', function(e) {
        const p1 = document.getElementById('pwd').value;
        const p2 = document.getElementById('pwd2').value;
        if (p1 !== p2) {
            e.preventDefault();
            alert('As senhas não coincidem.');
        }
    });
</script>

{% endblock %}
