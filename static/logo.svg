<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <!-- Neon amethyst glow filter -->
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <!-- First blur: soft base halo -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <!--
        Color matrix: shift the blurred graphic toward amethyst (#9D4EDD / #7B2CBF).
        Row order: R G B A (offset)
          R' = 0.6*R + 0*G + 0.9*B + 0.1   → boosts blue/red channel for purple
          G' = 0*R  + 0*G + 0.5*B + 0        → moderate green keeps it from being too blue
          B' = 0*R  + 0*G + 1*B  + 0.5       → strong blue with lift for neon glow
          A' = 0*R  + 0*G + 0*B  + 1          → preserve full opacity
      -->
      <feColorMatrix in="blur1" type="matrix"
        values="0.6 0 0.9 0 0.1
                0   0 0.5 0 0
                0   0 1   0 0.5
                0   0 0   1 0"
        result="tinted"/>
      <!-- Second, wider blur: outer glow spread -->
      <feGaussianBlur in="tinted" stdDeviation="6" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Camera icon ── -->
  <g filter="url(#neon)">
    <!-- Camera body -->
    <rect x="2" y="14" width="34" height="24" rx="4"
          fill="none" stroke="#9D4EDD" stroke-width="2.2"/>
    <!-- Lens ring outer -->
    <circle cx="19" cy="26" r="7.5"
            fill="none" stroke="#9D4EDD" stroke-width="2"/>
    <!-- Lens ring inner (iris) -->
    <circle cx="19" cy="26" r="3.5"
            fill="#9D4EDD" opacity="0.85"/>
    <!-- Viewfinder bump -->
    <rect x="12" y="10" width="10" height="5" rx="2"
          fill="none" stroke="#9D4EDD" stroke-width="2"/>
    <!-- Indicator dot -->
    <circle cx="31" cy="17" r="2"
            fill="#00F5D4" opacity="0.9"/>
  </g>

  <!-- ── VIZY wordmark ── -->
  <text filter="url(#neon)"
        x="46" y="37"
        font-family="'Poppins', 'Segoe UI', Arial, sans-serif"
        font-size="28"
        font-weight="700"
        letter-spacing="5"
        fill="#FFFFFF">VIZY</text>
</svg>
